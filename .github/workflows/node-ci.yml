name: Node App CI/CD

on:
  push:
    branches:
      - master

env:
  REGISTRY: harbor.local
  PROJECT: node-devops
  IMAGE_NAME: node-app
  NAMESPACE: node-app

jobs:

  build-and-deploy:

    runs-on: [self-hosted, Linux, X64]

    steps:

    - name: Checkout Repository
      uses: actions/checkout@v4

    # ---------- TEST STAGE ----------

    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: 20

    - name: Install Dependencies
      run: npm install

    - name: Run Tests
      run: npm test

    # ---------- BUILD IMAGE ----------

    - name: Build Docker Image
      run: |
        docker build -t $REGISTRY/$PROJECT/$IMAGE_NAME:${{ github.sha }} .

    # ---------- LOGIN HARBOR ----------

    - name: Login to Harbor
      run: |
        echo "${{ secrets.HARBOR_PASSWORD }}" | docker login $REGISTRY \
        -u "${{ secrets.HARBOR_USER }}" \
        --password-stdin

    # ---------- PUSH IMAGE ----------

    - name: Push Docker Image
      run: |
        docker push $REGISTRY/$PROJECT/$IMAGE_NAME:${{ github.sha }}

    # ---------- DEPLOY TO K8S ----------

    - name: Update Kubernetes Deployment
      run: |
        kubectl set image deployment/node-app \
        node-app=$REGISTRY/$PROJECT/$IMAGE_NAME:${{ github.sha }} \
        -n $NAMESPACE
